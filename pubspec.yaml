name: nav_aif_fyp
description: A Flutter app for AI-based indoor navigation
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.22.0"  

dependencies:
  flutter:
    sdk: flutter
  flutter_tts: ^4.0.0
  permission_handler: ^12.0.1
  android_intent_plus: ^6.0.0
  speech_to_text: ^7.0.0
  cupertino_icons: ^1.0.2
  path_drawing: ^1.0.1
  google_fonts: ^6.0.0
  shared_preferences: ^2.2.2
  camera: ^0.11.0+1
  google_mlkit_object_detection: ^0.15.0
  flutter_vision: ^2.0.0
  image: ^4.1.3  
  firebase_core: ^4.5.0
  firebase_database: ^12.1.4
  opencv_dart: ^1.4.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/langs/
    - assets/langs/en.json
    - assets/langs/ur.json
    - assets/chair.png
    - assets/bp.png
    - assets/btl.png
    - assets/door.png
    - assets/indoor_objects_model.tflite
    - assets/labels.txt